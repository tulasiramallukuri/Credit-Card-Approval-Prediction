<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Credit Card Approval Predictor{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="d-flex">
  <nav class="sidebar p-3">
    <h4 class="mb-4">💳 Approval Predictor</h4>
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link {% if active == 'overview' %}active{% endif %}" href="/">Overview</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active == 'comparison' %}active{% endif %}" href="/model-comparison">Model Comparison</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active == 'importance' %}active{% endif %}" href="/feature-importance">Feature Importance</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if active == 'predict' %}active{% endif %}" href="/predict">Live Prediction</a>
      </li>
    </ul>
    <hr>
    <p class="text-muted small">Synthetic data · Logistic Regression, Random Forest &amp; XGBoost</p>
  </nav>

  <main class="content p-4 flex-grow-1">
    {% block content %}{% endblock %}
  </main>
</div>

</body>
</html>
